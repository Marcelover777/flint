name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/flint/SKILL.md
      - skills/flint/MICRO.md
      - skills/flint-crew/SKILL.md
      - agents/flint-scout.md
      - agents/flint-smith.md
      - agents/flint-judge.md
      - skills/flint-compress/SKILL.md
      - skills/flint-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/flint/SKILL.md plugins/flint/skills/flint/SKILL.md
          cp skills/flint/MICRO.md plugins/flint/skills/flint/MICRO.md

      - name: Sync flint-compress skill to plugin
        run: |
          # Plugin distribution mirrors source verbatim — no rename, no sed.
          mkdir -p plugins/flint/skills/flint-compress
          cp skills/flint-compress/SKILL.md plugins/flint/skills/flint-compress/SKILL.md
          rm -rf plugins/flint/skills/flint-compress/scripts
          cp -r skills/flint-compress/scripts plugins/flint/skills/flint-compress/scripts
          rm -rf plugins/flint/skills/flint-compress/scripts/__pycache__

      - name: Sync flint-crew skill + agents to plugin
        run: |
          mkdir -p plugins/flint/skills/flint-crew plugins/flint/agents
          cp skills/flint-crew/SKILL.md plugins/flint/skills/flint-crew/SKILL.md
          cp agents/flint-scout.md plugins/flint/agents/flint-scout.md
          cp agents/flint-smith.md plugins/flint/agents/flint-smith.md
          cp agents/flint-judge.md plugins/flint/agents/flint-judge.md

      - name: Rebuild flint.skill ZIP
        run: mkdir -p dist && cd skills && zip -r ../dist/flint.skill flint/

      - name: Commit and push if changed
        run: |
          git add \
            skills/flint-compress/ \
            plugins/flint/skills/flint-compress/ \
            plugins/flint/skills/flint/SKILL.md \
            plugins/flint/skills/flint/MICRO.md \
            plugins/flint/skills/flint-crew/SKILL.md \
            plugins/flint/agents/flint-scout.md \
            plugins/flint/agents/flint-smith.md \
            plugins/flint/agents/flint-judge.md \
            dist/flint.skill
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies [skip ci]"
          git push
